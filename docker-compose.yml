services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - uploads-data:/app/public/uploads
      - db-data:/app/prisma
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=local-development-secret-key-123
      - SESSION_DURATION_SECONDS=3600
      - NODE_ENV=development
    restart: always

volumes:
  uploads-data:
  db-data:
